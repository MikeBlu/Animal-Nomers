<svg width="200" height="120" viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <style type="text/css">
        .home_link_text {
          text-rendering: optimizeLegibility;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          fill: #496e70;
          font-weight: 400;
          font-size: 3em;
          font-family: "Quicksand", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
      </style>
    </defs>
    <path d="M 0 20 Q 2 0, 18 0 Q 19 0, 20 1 Q 10 10, 22 20"
      fill="#1a1a1a"
      transform="translate(25,0)"/>
    <path d="M 0 20 Q 2 0, 18 0 Q 19 0, 20 1 Q 10 10, 22 20"
      fill="#1a1a1a"
      transform="translate(55,0)">
      <animate attributeName="d"
           dur="2s"
           repeatCount="indefinite"
           values="M 0 20 Q 2 0, 18 0 Q 19 0, 20 1 Q 10 10, 22 20; M 0 20 Q 2 10, -5 2 Q -5 0, -4 0 Q 10 2, 22 20; M 0 20 Q 2 0, 18 0 Q 19 0, 20 1 Q 10 10, 22 20"
           keyTimes="0; 0.1; 1"/>
    </path>
    <path d="M 160 50 A 5 5 180 0 1 160 75 L 110 75"
    fill="none"
    stroke="#1a1a1a"
    stroke-width="12" 
    stroke-linecap="round"
    />
    <text x="20" y="55" class="home_link_text">Kennel</text>
    <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="translate"
        values="1 1;1 10;1 1"
        dur="3s"
        repeatCount="indefinite"/>
</svg>