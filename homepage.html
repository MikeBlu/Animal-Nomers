<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Animal Nomers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Imports, Fonts, & Variables */
        @font-face {
            font-family: 'ShantyHouse';
            src: url('../static/fonts/ShantyHouseRegular-K7j4l.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        /* --- */

        /* Prelim */
        html, body {
            margin: 0;
            padding: 0;
        }
        #main > div {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }
        #background-wrapper {
            background: white;
        }
        #fixed {position: fixed;}
        #scrollable {position: absolute;}
        /* --- */

        #page-header {
            width: 100vw;
            height: 11.25vh;
            background: linear-gradient(to right, #FFA6F8 20%, #3CABEC 60%);
        }
        #page-content {
            margin-top: 11.25vh;
        }
        #title {
            color: white;
            font-family: 'ShantyHouse', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: medium;
            font-size: 3vw;
            text-shadow: -7px 8px 0 #FFFFFF19;
        }
        #page-nav {
            height: 100%;
        }
        .nav-link img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        /* Particle Styles */
        .woof-particle, .meow-particle {
            font-family: Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;
            font-size: .8em;
            color: rgb(48, 48, 48);
        }
        .meow-particle {
        }
        /* --- */
    </style>
</head>
<body>
    <div id="main">
        <div id="background-wrapper">
            <div id="fixed">
                <div id="page-header">
                    <div class="h-full mx-5 flex flex-row items-center justify-between">
                        <div id="page-title">
                            <h1 id="title">
                                Animal Nomers
                            </h1>
                        </div>
                        <div id="page-nav">
                            <nav class="h-full flex flex-row">
                                <button class="nav-link flex-1 h-full flex items-center justify-center">
                                    <img src="../static/svg/home_dog.svg"/>
                                </button>
                                <button class="nav-link flex-1 h-full flex items-center justify-center">
                                    <img src="../static/svg/kennel_cat.svg"/>
                                </button>
                                <button class="nav-link flex-1 h-full flex items-center justify-center">
                                    <img src="../static/svg/about_bird.svg"/>
                                </button>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
            <div id="scrollable">
                <div id="page-content">
                    <div class="table">
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
