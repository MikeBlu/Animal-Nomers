<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Animal Nomers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prelim */
        html, body {
            margin: 0;
            padding: 0;
        }
        #main > div {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }
        #background-wrapper {
            background: linear-gradient(to bottom right, #FB89AA 17%, #3CABEC 76%, #FB84B6 100%);
        }
        #fixed {position: fixed;}
        #scrollable {position: absolute;}
        /* --- */

        #page-header {
            width: 100vw;
            height: 11.25vh;
            background: linear-gradient(to right, #FFA6F846 20%, #FFA6F800 60%);
        }
        #page-content {
            margin-top: 11.25vh;
        }
        #title {
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;
            font-size: 2.5em;
            text-shadow: -7px 8px 0 #FFFFFF19;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="background-wrapper">
            <div id="fixed">
                <div id="page-header">
                    <div class="h-full mx-5 flex flex-row items-center">
                        <div id="page-title">
                            <h1 id="title">
                                Animal Nomers
                            </h1>
                        </div>
                    </div>
                </div>
            </div>
            <div id="scrollable">
                <div id="page-content">
                    <div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
